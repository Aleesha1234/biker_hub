name: biker_hub
description: All-in-one platform for bikers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Firebase (Latest Compatible Versions)
  firebase_core: ^2.30.1
  firebase_auth: ^4.19.1
  cloud_firestore: ^4.17.1
  firebase_database: ^10.4.9
  firebase_messaging: ^14.9.1
  firebase_storage: ^11.7.1  

  # Maps & Location
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0
 
  # State Management
  provider: ^6.1.2

  # Media
  image_picker: ^1.1.0
  image: ^4.2.0
  video_player: ^2.8.5
  chewie: ^1.8.1

  # UI Enhancement
  lottie: ^3.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.6

  # Utils
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.6
  permission_handler: ^11.3.1
  uuid: ^4.4.0
  intl: ^0.19.0 # Latest version for date formatting
  connectivity_plus: ^5.0.2
  flutter_launcher_icons: ^0.14.4


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/bike1.png
    - assets/images/bike2.png
    - assets/images/bike3.png
    - assets/images/bike4.png
    - assets/images/bike5.png
    - assets/images/bike6.png
    - assets/accessories/helemt.png
    - assets/accessories/jacket.png
    - assets/accessories/gps.png
    - assets/accessories/saddlebag.png
    - assets/animations/

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.14.4"